name: Deploy jsreport

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: REPORTS_SERVER

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Comprobar secrets de deploy
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          fail() { echo "::error::$1" >&2; exit 1; }
          [ -n "${SSH_HOST// }" ] || fail "Falta el secret SSH_HOST (IP o hostname SSH). Debe estar en el environment REPORTS_SERVER."
          [ -n "${SSH_USER// }" ] || fail "Falta el secret SSH_USER."
          [ -n "${SSH_PRIVATE_KEY// }" ] || fail "Falta el secret SSH_PRIVATE_KEY (clave privada PEM)."
          [ -n "${SSH_PORT// }" ] || fail "Falta el secret SSH_PORT (usa 22 si es el puerto por defecto)."
          [ -n "${APP_DIR// }" ] || fail "Falta el secret APP_DIR (ruta absoluta en el servidor, ej. /var/www/jsreport)."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure deploy folder exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            mkdir -p "${{ secrets.APP_DIR }}"

      - name: Upload project files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "."
          target: ${{ secrets.APP_DIR }}
          overwrite: true
          rm: true

      - name: Install production dependencies and reload PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.APP_DIR }}"
            npm ci --omit=dev
            if pm2 describe jsreport >/dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs --update-env
            else
              pm2 start ecosystem.config.cjs
              pm2 save
            fi
            pm2 status jsreport --no-pager
